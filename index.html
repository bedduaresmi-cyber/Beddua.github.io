<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beddua | Elite Clan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500;800&display=swap');

        :root {
            --red: #ff0000;
            --bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- ESKİ SEVDİĞİN TASARIM --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 8%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.9); z-index: 1000;
        }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-size: 12px; font-weight: 800; text-transform: uppercase; }

        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; background: radial-gradient(circle, #200000 0%, #050505 100%);
        }
        .hero h1 { font-family: 'Syncopate'; font-size: 80px; letter-spacing: 10px; }
        
        .btn-join { 
            padding: 20px 40px; background: var(--red); color: white; text-decoration: none;
            font-weight: 900; margin-top: 20px; border-radius: 5px; transition: 0.3s;
        }
        .btn-join:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--red); }

        .container { padding: 100px 10%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #111; padding: 40px; text-align: center; border-radius: 10px; border: 1px solid #222; }
        .card i { font-size: 40px; color: var(--red); margin-bottom: 20px; }

        /* WIDGET ALANI */
        .widget-box { margin-top: 50px; border: 1px solid #333; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>

    <nav>
        <div style="font-family: 'Syncopate'; font-weight: 700; color: var(--red);">BEDDUA</div>
        <div class="nav-links">
            <a href="#home">ANA SAYFA</a>
            <a href="#founders">EKİP</a>
            <a href="#live">CANLI</a>
        </div>
    </nav>

    <section class="hero" id="home">
        <h1>BEDDUA</h1>
        <p>Gölge gibi gelir, fırtına gibi gideriz.</p>
        <a href="https://discord.gg/pGwxsx2Y" class="btn-join">KLANA KATIL</a>
    </section>

    <div class="container" id="founders">
        <h2 style="text-align:center; margin-bottom:40px; font-family:'Syncopate';">KURUCULAR</h2>
        <div class="grid">
            <div class="card"><i class="fas fa-crown"></i><h3>hsmynova_</h3><p>ASIL KURUCU</p></div>
            <div class="card"><i class="fas fa-handshake"></i><h3>rolezoffical</h3><p>ORTAK</p></div>
            <div class="card"><i class="fas fa-shield-alt"></i><h3>naqauel.</h3><p>STRATEJİ</p></div>
        </div>
    </div>

    <div class="container" id="live">
        <h2 style="text-align:center; margin-bottom:20px; font-family:'Syncopate';">CANLI KOMUTA</h2>
        <div class="widget-box">
            <widgetbot
                server="1457837923561898049"
                channel="1476151928068243578"
                width="100%"
                height="500"
            ></widgetbot>
        </div>
    </div>

    <footer style="text-align:center; padding:40px; color:#444;">BEDDUA ELITE &copy; 2026</footer>

    <script src="https://cdn.jsdelivr.net/npm/@widgetbot/html-embed"></script>
</body>
</html>
