<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <title>Beddua | Elite Clan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500;800&display=swap');
        :root { --red: #ff0000; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        
        /* ESKİ NAVBAR */
        nav { position: fixed; top: 0; width: 100%; padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; }
        .nav-links a { color: white; text-decoration: none; margin-left: 25px; font-size: 12px; font-weight: 800; letter-spacing: 2px; }

        /* ESKİ HERO ALANI */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle, #1a0000 0%, #050505 100%); }
        .hero h1 { font-family: 'Syncopate'; font-size: 90px; letter-spacing: 15px; margin-bottom: 10px; }
        .hero p { letter-spacing: 5px; color: #555; text-transform: uppercase; }
        .btn-join { margin-top: 40px; padding: 20px 50px; background: var(--red); color: white; text-decoration: none; font-weight: 900; border-radius: 5px; transition: 0.3s; }
        .btn-join:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--red); }

        /* ESKİ KURUCU KARTLARI */
        .container { padding: 100px 10%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: #0a0a0a; padding: 60px 40px; text-align: center; border: 1px solid #151515; border-radius: 5px; }
        .card i { font-size: 45px; color: var(--red); margin-bottom: 25px; }
        .card h3 { font-family: 'Syncopate'; font-size: 18px; }

        /* WIDGETBOT (EN ALTA EK) */
        .live-chat { margin-top: 50px; border: 1px solid #222; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>

<nav>
