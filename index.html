<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beddua | Live Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500;800&display=swap');

        :root {
            --red: #ff0000;
            --bg: #050505;
            --card-bg: rgba(15, 15, 15, 0.9);
        }

        /* --- PRELOADER & GLITCH --- */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease;
        }
        .glitch-wrapper {
            font-family: 'Syncopate'; font-size: 60px; font-weight: 700;
            color: white; letter-spacing: 15px; position: relative;
        }
        .glitch-wrapper::before, .glitch-wrapper::after { content: 'BEDDUA'; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .glitch-wrapper::before { color: var(--red); left: 2px; text-shadow: -2px 0 var(--red); clip: rect(44px, 450px, 56px, 0); animation: glitch 2s infinite linear alternate-reverse; }
        .glitch-wrapper::after { color: #fff; left: -2px; text-shadow: 2px 0 blue; clip: rect(44px, 450px, 56px, 0); animation: glitch 2s infinite linear alternate; }
        @keyframes glitch { 0% { clip: rect(10px, 9999px, 9px, 0); } 100% { clip: rect(70px, 9999px, 90px, 0); } }
        .preloader-hidden { opacity: 0; visibility: hidden; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 8%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,0,0,0.1); z-index: 1000;
        }
        .nav-links a { color: #888; text-decoration: none; margin-left: 25px; font-size: 11px; letter-spacing: 2px; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: var(--red); }

        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; background: radial-gradient(circle at center, #1a0000 0%, #050505 100%);
        }
        .hero h1 { font-family: 'Syncopate'; font-size: clamp(40px, 10vw, 110px); letter-spacing: 15px; }
        .hero p { color: #444; letter-spacing: 6px; margin-bottom: 35px; }

        .btn-join { 
            padding: 22px 60px; background: var(--red); color: white; text-decoration: none;
            font-weight: 900; letter-spacing: 5px; border-radius: 4px; transition: 0.4s;
        }
        .btn-join:hover { background: white; color: black; box-shadow: 0 0 50px white; }

        /* --- CANLI ÜYE SAYACI --- */
        .live-stats { margin-top: 50px; display: flex; gap: 40px; border-top: 1px solid #111; padding-top: 30px; }
        .stat-box { text-align: center; }
        .stat-val { font-family: 'Syncopate'; font-size: 28px; color: var(--red); display: block; }
        .stat-lab { font-size: 10px; color: #555; letter-spacing: 2px; }

        /* --- EKİP & FORM --- */
        .container { padding: 100px 10%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: var(--card-bg); padding: 50px 30px; border: 1px solid #151515; text-align: center; border-radius: 10px; }
        .card i { font-size: 40px; color: var(--red); margin-bottom: 20px; }

        .form-box { max-width: 600px; margin: 0 auto; background: #080808; padding: 40px; border: 1px solid #111; border-radius: 8px; }
        input, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: white; margin-bottom: 20px; }

        /* CANLI WIDGET ALANI */
        .widget-wrapper { margin-top: 50px; border: 2px solid #111; border-radius: 12px; overflow: hidden; background: #000; }

        footer { padding: 60px; text-align: center; color: #222; font-size: 10px; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div id="preloader"><div class="glitch-wrapper">BEDDUA</div></div>

    <nav>
        <div style="font-family: 'Syncopate'; font-weight: 700; color: var(--red);">BEDDUA.</div>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#join">Klana Gir</a>
            <a href="#founders">Ekip</a>
            <a href="#live">Canlı</a>
        </div>
    </nav>

    <section class="hero" id="home">
        <h1>BEDDUA</h1>
        <p>MUTLAK SADAKAT, EBEDİ GÜÇ.</p>
        <a href="#join" class="btn-join">KLANA GİR!</a>
        
        <div class="live-stats">
            <div class="stat-box"><span class="stat-val" id="onlineCount">LIVE</span><span class="stat-lab">Online</span></div>
            <div class="stat-box"><span class="stat-val" id="totalCount">AKTİF</span><span class="stat-lab">Mevcut</span></div>
        </div>
    </section>

    <div class="container" id="founders">
        <h2 style="text-align:center; font-family:'Syncopate'; margin-bottom:60px; color:var(--red);">YÖNETİM</h2>
        <div class="grid">
            <div class="card"><i class="fas fa-crown"></i><h3>hsmynova_</h3><span style="color:red; font-size:10px;">ASIL KURUCU</span></div>
            <div class="card"><i class="fas fa-handshake"></i><h3>rolezoffical</h3><span style="color:red; font-size:10px;">ORTAĞIM</span></div>
            <div class="card"><i class="fas fa-shield-alt"></i><h3>naqauel.</h3><span style="color:red; font-size:10px;">KURUCU ORTAK</span></div>
        </div>
    </div>

    <div class="container" id="live" style="background: #020202;">
        <h2 style="text-align:center; font-family:'Syncopate'; margin-bottom:30px; color:var(--red);">KOMUTA MERKEZİ</h2>
        <div class="widget-wrapper">
            <widgetbot 
                server="1457837923561898049" 
                channel="1489329848932499478" 
                width="100%" 
                height="600"
            ></widgetbot>
        </div>
    </div>

    <div class="container" id="join">
        <div class="form-box">
            <h2 style="text-align:center; font-family:'Syncopate'; margin-bottom:30px;">BAŞVURU</h2>
            <input type="text" id="mcName" placeholder="MC Adın">
            <input type="text" id="discordTag" placeholder="Discord Adın">
            <textarea id="feda" rows="3" placeholder="Beddua için neleri feda edersin?"></textarea>
            <button onclick="klanaBasvur()" class="btn-join" style="width:100%;">GÖNDER</button>
        </div>
    </div>

    <footer>BEDDUA CLAN &copy; 2026</footer>

    <script src="https://cdn.jsdelivr.net/npm/@widgetbot/html-embed"></script>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('preloader').classList.add('preloader-hidden'); }, 2000);
            fetchDiscordStats();
        });

        async function fetchDiscordStats() {
            try {
                const response = await fetch(`https://discord.com/api/guilds/1457837923561898049/widget.json`);
                const data = await response.json();
                if(data.presence_count) {
                    document.getElementById('onlineCount').innerText = data.presence_count;
                    document.getElementById('totalCount').innerText = data.members.length + "+";
                }
            } catch (err) {
                console.log("Widget API kapalı, LIVE modu aktif.");
            }
        }

        async function klanaBasvur() {
            const webhookURL = "https://discord.com/api/webhooks/1490710472113258509/vT_WhugfRkyOTtgpMdLcIKm4zWi9qeVWdPyh0Sbh8pTD9wq4ASMmTis5SXAyWNf7RlCS";
            const mc = document.getElementById('mcName').value;
            const dc = document.getElementById('discordTag').value;
            const feda = document.getElementById('feda').value;
            if(!mc || !dc || !feda) return alert("Eksik!");
            
            const payload = { embeds: [{ title: "⚔️ ADAY GELDİ!", color: 16711680, fields: [{ name: "MC", value: mc }, { name: "DC", value: dc }, { name: "Mesaj", value: feda }] }] };
            await fetch(webhookURL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            alert("İletildi!");
        }
    </script>
</body>
</html>
