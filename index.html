<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beddua | Elite Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500;800&display=swap');
        :root { --red: #ff0000; --bg: #050505; --card-bg: rgba(15, 15, 15, 0.9); }
        
        /* PRELOADER & GLITCH */
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.8s; }
        .glitch-wrapper { font-family: 'Syncopate'; font-size: 60px; font-weight: 700; color: white; letter-spacing: 15px; position: relative; }
        .glitch-wrapper::before, .glitch-wrapper::after { content: 'BEDDUA'; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .glitch-wrapper::before { color: var(--red); left: 2px; text-shadow: -2px 0 var(--red); clip: rect(44px, 450px, 56px, 0); animation: glitch 2s infinite linear alternate-reverse; }
        .glitch-wrapper::after { color: #fff; left: -2px; text-shadow: 2px 0 blue; clip: rect(44px, 450px, 56px, 0); animation: glitch 2s infinite linear alternate; }
        @keyframes glitch { 0% { clip: rect(10px, 9999px, 9px, 0); } 100% { clip: rect(70px, 9999px, 90px, 0); } }
        .preloader-hidden { opacity: 0; visibility: hidden; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        nav { position: fixed; top: 0; width: 100%; padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #111; }
        .nav-links a { color: #666; text-decoration: none; margin-left: 20px; font-size: 11px; letter-spacing: 2px; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: var(--red); }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at center, #150000 0%, #050505 100%); }
        .hero h1 { font-family: 'Syncopate'; font-size: clamp(40px, 8vw, 90px); letter-spacing: 15px; }
        .btn-join { margin-top: 30px; padding: 20px 50px; background: var(--red); color: white; text-decoration: none; font-weight: 900; letter-spacing: 4px; border-radius: 2px; transition: 0.4s; }
        .btn-join:hover { background: white; color: black; box-shadow: 0 0 40px white; }

        /* WIDGET ALANI */
        .widget-section { padding: 80px 10%; background: #080808; text-align: center; }
        .widget-container { 
            max-width: 1000px; margin: 40px auto; border: 2px solid #111; border-radius: 10px; 
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
        }
        widgetbot { display: block; border: none; width: 100%; }

        .container { padding: 100px 10%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: var(--card-bg); padding: 50px 30px; border: 1px solid #151515; text-align: center; border-radius: 8px; }
        .card i { font-size: 40px; color: var(--red); margin-bottom: 15px; }

        footer { padding: 40px; text-align: center; color: #222; font-size: 10px; letter-spacing: 3px; }
    </style>
</head>
<body>

<div id="preloader"><div class="glitch-wrapper">BEDDUA</div></div>

<nav>
    <div style="font-family: 'Syncopate'; font-weight: 700; color: var(--red);">BEDDUA.CLAN</div>
    <div class="nav-links">
        <a href="#home">Home</a>
        <a href="#live">Canlı Sohbet</a>
        <a href="#founders">Ekip</a>
    </div>
</nav>

<section class="hero" id="home">
    <h1>BEDDUA</h1>
    <p style="letter-spacing: 5px; color: #444; margin-top: 10px;">GÖLGELERİN EFENDİSİ</p>
    <a href="https://discord.gg/pGwxsx2Y" class="btn-join">BİZE KATIL</a>
</section>

<section class="widget-section" id="live">
    <h2 style="font-family: 'Syncopate'; letter-spacing: 5px;">KOMUTA MERKEZİ</h2>
    <p style="color: #444; font-size: 12px; margin-top: 5px;">CANLI SOHBET VE ÜYE LİSTESİ</p>
    
    <div class="widget-container">
        <widgetbot
            server="1457837923561898049"
            channel="1476151928068243578"
            width="100%"
            height="500"
        ></widgetbot>
    </div>
</section>

<div class="container" id="founders">
    <div class="grid">
        <div class="card"><i class="fas fa-crown"></i><h3>hsmynova_</h3><p style="color:var(--red); font-size:10px; margin-top:5px;">KURUCU</p></div>
        <div class="card"><i class="fas fa-handshake"></i><h3>rolezoffical</h3><p style="color:var(--red); font-size:10px; margin-top:5px;">ORTAK</p></div>
        <div class="card"><i class="fas fa-shield-alt"></i><h3>naqauel.</h3><p style="color:var(--red); font-size:10px; margin-top:5px;">STRATEJİ</p></div>
    </div>
</div>

<footer>BEDDUA ELITE &copy; 2026</footer>

<script src="https://cdn.jsdelivr.net/npm/@widgetbot/html-embed"></script>
<script>
    window.addEventListener('load', () => {
        setTimeout(() => { document.getElementById('preloader').classList.add('preloader-hidden'); }, 2000);
    });
</script>

</body>
</html>
